<svg width="200" height="200" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JS terminal logo">
  <title>JS Terminal Logo</title>
  <desc>A terminal-style monogram logo featuring "$ js" with a blinking cursor.</desc>
  <rect x="0" y="0" width="160" height="160" fill="#000000" rx="12"/>
  <text x="80" y="92" text-anchor="middle" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-weight="500" font-size="38" fill="#FFFFFF">$ js</text>
  <rect x="125" y="72" width="14" height="22" fill="#FFFFFF">
    <animate attributeName="opacity" values="1;1;0;0" dur="1s" repeatCount="indefinite"/>
  </rect>
</svg>
